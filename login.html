<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- ✅ FIX 1: Proper mobile scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Login / Sign-Up - OFFICIAL KUCCPS HUB</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0b1b3a, #020617, #1e3a8a, #020617);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            margin: 0;

            /* ✅ FIX 2: allow scrolling on small screens */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            padding: 20px;
            box-sizing: border-box;

            color: white;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .auth-wrapper {
            perspective: 1000px;
            width: 100%;
            max-width: 450px;

            /* ✅ FIX 3: prevent overflow on small phones */
            padding: 0 10px;
            box-sizing: border-box;
        }

        .auth-card {
            width: 100%;
            border-radius: 16px;
            background: rgba(26, 31, 59, 0.95);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            transition: transform 0.8s ease;
            transform-style: preserve-3d;
            position: relative;

            padding: 40px 30px;

            display: flex;
            flex-direction: column;
            align-items: center;

            /* ✅ FIX 4: allow content to grow properly */
            min-height: 420px;
        }

        .auth-card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            backface-visibility: hidden;
            top: 0;
            left: 0;

            display: flex;
            flex-direction: column;
            align-items: center;

            padding: 0 10px;
            box-sizing: border-box;
        }

        .sign-up {
            transform: rotateY(180deg);
        }

        h2 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 24px;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border-radius: 12px;
            border: none;
            background: #0f172a;
            color: white;
            font-size: 16px;
            outline: none;
            transition: transform 0.3s ease, background 0.3s ease;

            /* ✅ FIX 5: prevent inputs being too wide */
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            background: #38bdf8;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;

            box-sizing: border-box;
        }

        button:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }

        .toggle-link {
            text-align: center;
            margin-top: 18px;
            color: #94a3b8;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .toggle-link:hover {
            color: #38bdf8;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #22c55e;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            font-weight: 500;

            /* ✅ FIX 6: mobile safe position */
            max-width: 90%;
        }

        footer {
            color: #94a3b8;
            font-size: 13px;
            position: absolute;
            bottom: 10px;
            text-align: center;
        }

        /* =========================
           📱 MOBILE RESPONSIVENESS
        ========================== */

        @media (max-width: 600px) {

            body {
                justify-content: flex-start;
                padding-top: 40px;
            }

            .auth-card {
                padding: 25px 20px;
                border-radius: 14px;
            }

            h2 {
                font-size: 20px;
                margin-bottom: 20px;
            }

            input,
            select {
                padding: 12px;
                font-size: 14px;
            }

            button {
                padding: 14px;
                font-size: 15px;
            }

            .toggle-link {
                font-size: 13px;
            }

            .toast {
                right: 10px;
                bottom: 10px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div id="authCard" class="auth-card">

            <!-- Login Face -->
            <div class="card-face login-face">
                <h2>Login</h2>
                <select id="loginUserType">
                    <option value="student">I am a Student</option>
                    <option value="parent">I am a Parent</option>
                </select>
                <input type="email" id="loginEmail" placeholder="Email Address">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="handleLogin()">Login</button>
                <div class="toggle-link" onclick="flipCard()">Don't have an account? Sign Up</div>
            </div>

            <!-- Sign-Up Face -->
            <div class="card-face sign-up">
                <h2>Sign Up</h2>
                <input type="text" id="signUpUsername" placeholder="Username">
                <select id="signUpUserType">
                    <option value="student">I am a Student</option>
                    <option value="parent">I am a Parent</option>
                </select>
                <input type="email" id="signUpEmail" placeholder="Email Address">
                <input type="password" id="signUpPassword" placeholder="Password">
                <button onclick="handleSignUp()">Create Account</button>
                <div class="toggle-link" onclick="flipCard()">Already have an account? Login</div>
            </div>

        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- 🔒 YOUR JS REMAINS UNCHANGED -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyAOKTyvEnK2e_ypG_1rcifpVObxBnpjJ9c",
            authDomain: "official-kuccps-hub.firebaseapp.com",
            projectId: "official-kuccps-hub"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authCard = document.getElementById("authCard");

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        }

        window.flipCard = function () {
            authCard.classList.toggle("flipped");
        }

        window.handleLogin = async function () {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            const userType = document.getElementById("loginUserType").value;

            if (!email || !password) {
                showToast("Please fill all fields");
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast("Login successful!");

                const pendingId = sessionStorage.getItem("pendingPostId");
                if (pendingId) {
                    sessionStorage.removeItem("pendingPostId");
                    window.location.href = `blog.html?id=${pendingId}`;
                } else {
                    if (userType === "parent") {
                        window.location.href = "parent-dashboard.html";
                    } else {
                        window.location.href = "student-dashboard.html";
                    }
                }
            } catch (e) {
                showToast("Login failed. Check your credentials.");
            }
        }

        window.handleSignUp = async function () {
            const username = document.getElementById("signUpUsername").value.trim();
            const email = document.getElementById("signUpEmail").value.trim();
            const password = document.getElementById("signUpPassword").value.trim();
            const userType = document.getElementById("signUpUserType").value;

            if (!username || !email || !password) {
                showToast("Please fill all fields");
                return;
            }

            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);

                await setDoc(doc(db, "users", userCred.user.uid), {
                    username: username,
                    email: email,
                    role: userType,
                    createdAt: new Date().toISOString()
                });

                showToast("Account created successfully!");

                const pendingId = sessionStorage.getItem("pendingPostId");
                if (pendingId) {
                    sessionStorage.removeItem("pendingPostId");
                    window.location.href = `blog.html?id=${pendingId}`;
                } else {
                    if (userType === "parent") {
                        window.location.href = "parent-dashboard.html";
                    } else {
                        window.location.href = "student-dashboard.html";
                    }
                }
            } catch (e) {
                showToast("Sign up failed: " + e.message);
            }
        }
    </script>

</body>

</html>
