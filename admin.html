<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - OFFICIAL KUCCPS HUB</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* === YOUR ORIGINAL STYLES - UNCHANGED === */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #0b1b3a;
            color: #fff;
        }

        header {
            padding: 15px;
            background: #020617;
            text-align: center;
        }

        header h1 {
            color: #38bdf8;
            font-size: 22px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .form-card {
            background: #1a1f3b;
            padding: 18px;
            border-radius: 12px;
            max-width: 420px;
            margin: auto;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        }

        .form-card h3 {
            text-align: center;
            color: #38bdf8;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            background: #0f172a;
            color: white;
            outline: none;
        }

        textarea {
            height: 90px;
            resize: none;
        }

        button {
            padding: 10px;
            background: #facc15;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: 0.2s;
        }

        button:hover {
            background: #eab308;
        }

        .preview {
            text-align: center;
            margin-top: 10px;
        }

        .preview img {
            max-width: 100%;
            border-radius: 8px;
        }

        .live-preview {
            background: #020617;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .live-preview img {
            width: 100%;
            border-radius: 8px;
        }

        #search {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
        }

        .post-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .post-item {
            background: #1a1f3b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .post-item img {
            width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }

        .meta {
            font-size: 12px;
            opacity: 0.8;
            margin: 8px 0;
        }

        /* Status message styling */
        .status {
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            background: #166534;
            color: #86efac;
        }

        .error {
            background: #7f1d1d;
            color: #fda4af;
        }
    </style>
</head>

<body>

    <header>
        <h1>OFFICIAL KUCCPS HUB - Admin Panel</h1>
    </header>

    <div class="container">

        <!-- Create Post Form -->
        <div class="form-card">
            <h3>Create New Post</h3>

            <input type="text" id="title" placeholder="Post Title">
            <textarea id="content" placeholder="Post Content"></textarea>

            <!-- Vercel Blob Upload -->
            <input type="file" id="imageFile" accept="image/*">
            <button onclick="uploadImageToVercelBlob()">Upload Image to Vercel Blob</button>
            <input type="text" id="image" placeholder="Image URL (auto-filled after upload)" readonly>

            <select id="category">
                <option value="general">General Announcements</option>
                <option value="kuccps">KUCCPS News</option>
                <option value="admission">Admission Deadlines</option>
                <option value="university">University Updates</option>
                <option value="scholarship">Scholarships</option>
            </select>

            <button onclick="previewImage()">Preview Image</button>
            <button onclick="addPost()">Publish Post</button>

            <div class="preview" id="preview"></div>
            <div class="live-preview" id="livePreview"></div>
        </div>

        <!-- Search -->
        <input type="text" id="search" placeholder="Search posts...">

        <!-- Posts List -->
        <div class="post-list" id="postList"></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyAOKTyvEnK2e_ypG_1rcifpVObxBnpjJ9c",
            authDomain: "official-kuccps-hub.firebaseapp.com",
            projectId: "official-kuccps-hub"
        });
        const db = getFirestore(app);

        /* Live Preview */
        const titleInput = document.getElementById("title");
        const contentInput = document.getElementById("content");
        const imageInput = document.getElementById("image");
        const livePreview = document.getElementById("livePreview");

        function updatePreview() {
            livePreview.innerHTML = `
                <h4>${titleInput.value || "Title Preview"}</h4>
                ${imageInput.value ? `<img src="${imageInput.value}">` : ""}
                <p>${contentInput.value || "Content preview..."}</p>
            `;
        }

        titleInput.addEventListener("input", updatePreview);
        contentInput.addEventListener("input", updatePreview);
        imageInput.addEventListener("input", updatePreview);

        window.previewImage = function () {
            const preview = document.getElementById("preview");
            const image = imageInput.value;
            preview.innerHTML = image ? `<img src="${image}">` : "<p>No image</p>";
        };

        // IMPROVED UPLOAD FUNCTION - This is the only change
        window.uploadImageToVercelBlob = async function () {
            const fileInput = document.getElementById("imageFile");
            const file = fileInput.files[0];
            if (!file) {
                alert("Please select an image file first");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            try {
                // Show loading feedback
                const uploadBtn = document.querySelector('button[onclick="uploadImageToVercelBlob()"]');
                const originalText = uploadBtn.textContent;
                uploadBtn.textContent = "Uploading...";
                uploadBtn.disabled = true;

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                document.getElementById("image").value = data.url;

                alert("✅ Image uploaded successfully to Vercel Blob!");
                updatePreview();

            } catch (error) {
                console.error("Upload error:", error);
                alert(`Upload failed: ${error.message}\n\nMake sure api/upload.js exists in your project and the site has been fully redeployed on Vercel.`);
            } finally {
                // Reset button
                const uploadBtn = document.querySelector('button[onclick="uploadImageToVercelBlob()"]');
                if (uploadBtn) {
                    uploadBtn.textContent = "Upload Image to Vercel Blob";
                    uploadBtn.disabled = false;
                }
            }
        };

        /* Publish Post - unchanged */
        window.addPost = async function () {
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            const image = imageInput.value.trim();
            const category = document.getElementById("category").value;

            if (!title || !content) {
                alert("Title and Content are required");
                return;
            }

            const slug = title.toLowerCase().replace(/\s+/g, '-');
            const now = new Date();

            await addDoc(collection(db, "posts"), {
                title,
                content,
                image,
                category,
                createdAt: now.toISOString(),
                timestamp: now.getTime(),
                slug,
                status: "published",
                views: 0,
                likes: 0
            });

            alert("Published Successfully ✅");

            titleInput.value = "";
            contentInput.value = "";
            imageInput.value = "";
            document.getElementById("imageFile").value = "";
            document.getElementById("preview").innerHTML = "";
            livePreview.innerHTML = "";

            loadPosts();
        };

        /* All your original functions remain completely unchanged below */
        window.deletePost = async function (id) {
            if (!confirm("Delete this post?")) return;
            await deleteDoc(doc(db, "posts", id));
            loadPosts();
        };

        window.editPost = async function (id) {
            const postRef = doc(db, "posts", id);
            const snap = await getDocs(collection(db, "posts"));
            const postDoc = snap.docs.find(d => d.id === id);
            if (!postDoc) return;
            const post = postDoc.data();

            const newTitle = prompt("New Title", post.title);
            const newContent = prompt("New Content", post.content);
            const newImage = prompt("New Image URL", post.image);

            if (newTitle && newContent) {
                await updateDoc(postRef, {
                    title: newTitle,
                    content: newContent,
                    image: newImage
                });
                loadPosts();
            }
        };

        window.toggleStatus = async function (id, currentStatus) {
            const newStatus = currentStatus === "published" ? "draft" : "published";
            await updateDoc(doc(db, "posts", id), { status: newStatus });
            loadPosts();
        };

        window.manageComments = function (postId, title) {
            const container = document.getElementById(`comments-${postId}`);
            container.innerHTML = `<p><strong>Loading comments for "${title}"...</strong></p>`;

            onSnapshot(collection(db, "comments"), (snap) => {
                let html = `<strong>Comments for: ${title}</strong><br><br>`;
                let found = false;
                snap.forEach((docSnap) => {
                    const c = docSnap.data();
                    if (c.postId === postId) {
                        found = true;
                        const isHidden = c.hidden === true;
                        html += `
                            <div class="comment-item">
                                <p><strong>Comment:</strong> ${c.text}</p>
                                <small>Time: ${new Date(c.time || Date.now()).toLocaleString()}</small>
                                <div class="comment-actions">
                                    <button onclick="toggleHideComment('${docSnap.id}', ${isHidden})">
                                        ${isHidden ? '✅ Unhide' : '🙈 Hide'}
                                    </button>
                                    <button onclick="deleteComment('${docSnap.id}')" style="background:#ef4444; color:white;">Delete</button>
                                </div>
                            </div>
                        `;
                    }
                });
                if (!found) html += "<p>No comments yet for this post.</p>";
                container.innerHTML = html;
            });
        };

        window.toggleHideComment = async function (commentId, currentlyHidden) {
            await updateDoc(doc(db, "comments", commentId), { hidden: !currentlyHidden });
        };

        window.deleteComment = async function (commentId) {
            if (confirm("Delete this comment permanently?")) {
                await deleteDoc(doc(db, "comments", commentId));
            }
        };

        async function loadPosts() {
            const container = document.getElementById("postList");
            container.innerHTML = "<p>Loading posts...</p>";

            const querySnapshot = await getDocs(collection(db, "posts"));
            container.innerHTML = "";

            querySnapshot.forEach((docItem) => {
                const post = docItem.data();
                const postId = docItem.id;

                container.innerHTML += `
                    <div class="post-item">
                        <strong>${post.title}</strong>
                        <div class="meta">
                            Category: ${post.category || 'General'} | 
                            Status: ${post.status || 'published'} | 
                            Views: ${post.views || 0}
                        </div>
                        ${post.image ? `<img src="${post.image}">` : ""}
                        <button class="edit-btn" onclick="event.stopPropagation(); editPost('${postId}')">Edit Post</button>
                        <button class="status-btn" onclick="event.stopPropagation(); toggleStatus('${postId}', '${post.status}')">Toggle Status</button>
                        <button class="delete-btn" onclick="event.stopPropagation(); deletePost('${postId}')">Delete Post</button>
                        <button class="comment-btn" onclick="event.stopPropagation(); manageComments('${postId}', '${post.title.replace(/'/g, "\\'")}')">Manage Comments</button>
                        <div id="comments-${postId}" class="comments-section"></div>
                    </div>
                `;
            });
        }

        document.getElementById("search").addEventListener("input", function (e) {
            const value = e.target.value.toLowerCase();
            document.querySelectorAll(".post-item").forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(value) ? "block" : "none";
            });
        });

        loadPosts();
    </script>

</body>
